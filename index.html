<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Portal</title>
    <style>
        /* Keep or paste the CSS styles here to ensure buttons look clean */
        body { font-family: sans-serif; margin: 0; padding: 15px; background-color: #f9f9f9; }
        .container { max-width: 600px; margin: 0 auto; }
        .section-box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .menu-btn { width: 100%; padding: 20px; font-size: 18px; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 15px; text-align: left; }
        #verify-launch-btn { background-color: #0070f3; }
        #view-reports-btn { background-color: #37474f; }
        #fault-launch-btn { background-color: #d32f2f; }
        #qr-reader { width: 100%; border: 2px dashed #ccc; border-radius: 8px; overflow: hidden; background: #fafafa; }
        #qr-reader button { background-color: #0070f3; color: white; border: none; padding: 12px 20px; border-radius: 6px; margin: 15px auto; display: block; }
    </style>
</head>
<body>

    <div class="container">

        <div id="start-page-view">
            <header style="text-align: center; margin-bottom: 30px;">
                <h1>Maintenance Portal</h1>
                <p style="color: #666;">Select task below</p>
            </header>
            <button id="verify-launch-btn" class="menu-btn">🔍 Scan Tool Inventory →</button>
            <button id="view-reports-btn" class="menu-btn">📊 View Inventory Reports →</button>
            <button id="fault-launch-btn" class="menu-btn">⚠️ Fault Detection Mode (WebXR) →</button>
        </div>

        <div id="scanner-view" style="display: none;">
            <nav style="margin-bottom: 15px;">
                <button class="portal-back-btn" style="background: #e0e0e0; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer;">← Back to Menu</button>
            </nav>
            <div class="section-box">
                <h2 style="font-size: 18px; margin-top: 0;">Tool QR Code Scanner</h2>
                <div id="qr-reader"></div>
                <div id="scan-feedback" style="text-align: center; margin-top: 15px; font-weight: bold; color: #0070f3;">Status: Awaiting Scan...</div>
                <button id="submit-inspection-btn" style="width: 100%; padding: 14px; background-color: #2e7d32; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; margin-top: 15px; cursor: pointer;">Submit Complete Inspection Report</button>
            </div>
        </div>

        <div id="reports-view" style="display: none;">
            <nav style="margin-bottom: 15px;">
                <button class="portal-back-btn" style="background: #e0e0e0; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer;">← Back to Menu</button>
            </nav>
            <div class="section-box">
                <h2 style="font-size: 20px; margin-top: 0;">Historical Inventory Logs</h2>
                <p style="color: #666; font-size: 14px;">Pulled live from Supabase storage matrix.</p>
                <div id="dashboard-history-list">
                    <p style="color: #999; text-align: center;">Loading data logs...</p>
                </div>
            </div>
        </div>

    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
